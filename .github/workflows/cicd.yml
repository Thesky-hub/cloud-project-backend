name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Checkout Code (拉取代码)
      uses: actions/checkout@v3

    - name: 2. Login to SWR (登录华为云SWR)
      uses: docker/login-action@v2
      with:
        registry: swr.cn-north-4.myhuaweicloud.com
        username: ${{ secrets.SWR_USERNAME }}
        password: ${{ secrets.SWR_PASSWORD }}

    - name: 3. Build & Push Image (构建并推送镜像)
      run: |
        IMAGE_TAG=${{ github.sha }}
        IMAGE_NAME=swr.cn-north-4.myhuaweicloud.com/zhoukewei2024112666/backend:$IMAGE_TAG
        docker build -t $IMAGE_NAME -f Dockerfile.backend .
        docker push $IMAGE_NAME

    - name: 4. Setup kubectl (配置K8s客户端)
      uses: azure/setup-kubectl@v3

    - name: 5. Update K8s Deployment (自动更新集群)
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
      run: |
        mkdir -p ~/.kube
        echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
        IMAGE_TAG=${{ github.sha }}
        kubectl set image deployment/backend backend=swr.cn-north-4.myhuaweicloud.com/zhoukewei2024112666/backend:$IMAGE_TAG -n default
